name: CI Trivia DL

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Inspección de código
        run: python -m flake8 .

      - name: Ejecutar pruebas
        run: python -m pytest

      - name: Notificar éxito en Slack
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Trivia-DL: Integración Continua exitosa. Flake8 y Pytest aprobados."}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notificar fallo en Slack
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Trivia-DL: La Integración Continua falló. Revisar GitHub Actions."}' \
          ${{ secrets.SLACK_WEBHOOK_URL }}